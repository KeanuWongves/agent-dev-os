# Project state for a project generated from agent-dev-os.
# Keep this file lightweight. Durable decisions belong in product/, architecture/, management/, or tasks/.
project:
  name: "<Project Name>"
  status: "Draft"
  current_milestone: null
  source_of_truth:
    research: "research/"
    product: "product/"
    architecture: "architecture/"
    management: "management/"
    tasks: "tasks/"
  last_updated: "YYYY-MM-DD"

artifacts:
  research_brief: "research/RESEARCH_BRIEF.md"
  source_log: "research/SOURCE_LOG.md"
  open_source_scan: "research/OPEN_SOURCE_SCAN.md"
  reference_product_analysis: "research/REFERENCE_PRODUCT_ANALYSIS.md"
  feature_matrix: "research/FEATURE_MATRIX.md"
  gap_analysis: "research/GAP_ANALYSIS.md"
  reuse_decisions: "research/REUSE_DECISIONS.md"
  product_prd: "product/PRD.md"
  product_mvp: "product/MVP.md"
  roadmap: "product/ROADMAP.md"
  system_design: "architecture/SYSTEM_DESIGN.md"
  human_review_gates: "management/HUMAN_REVIEW_GATES.md"
  approvals: "management/APPROVALS.md"
  master_plan: "management/MASTER_PLAN.md"
  task_board: "management/TASK_BOARD.md"
  validation_status: "management/VALIDATION_STATUS.md"

current_focus:
  role: null
  artifact: null
  reason: null
